<h2 mat-dialog-title>Renaming "{{ data.name }}"</h2>
<mat-dialog-content>
  <p>Select a new name.</p>
  <mat-form-field>
    <mat-label>New Name</mat-label>
    <input matInput [(ngModel)]="name">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button [mat-dialog-close]="name" cdkFocusInitial>Save</button>
</mat-dialog-actions>
