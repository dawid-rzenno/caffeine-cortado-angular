<mat-card>
  <mat-card-header>
    <mat-card-title>
      <h2>
        <a [routerLink]="['/diet/form']"
          ><fa-icon [icon]="['fas', 'plus']"></fa-icon
        ></a>
        Diets
      </h2>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="items">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let item">{{ item.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let item">
          <a [routerLink]="['/diet/details', item.id]">{{ item.name }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let item">
          <button mat-button="primary" [routerLink]="['/diet/form', item.id]">
            Edit
          </button>
          &nbsp;
          <button mat-button (click)="onDeleteClick(item)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
  <mat-card-actions>
    <mat-paginator
      [length]="matPaginatorConfig.length"
      [pageSize]="matPaginatorConfig.pageSize"
      [pageIndex]="matPaginatorConfig.pageIndex"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
      aria-label="Select page"
    ></mat-paginator>
  </mat-card-actions>
</mat-card>
